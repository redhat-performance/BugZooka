apiVersion: v1
kind: Secret
metadata:
  name: bugzooka-jira
  namespace: ${BUGZOOKA_NAMESPACE}
  annotations:
    kubernetes.io/service-account.name: default
type: Opaque
stringData:
  JIRA_BASE_URL: "${JIRA_BASE_URL}"
  JIRA_TOKEN: "${JIRA_TOKEN}"
  JIRA_ALLOWED_PROJECTS: "${JIRA_ALLOWED_PROJECTS}"
